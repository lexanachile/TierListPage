<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tier List Maker</title>
    <link rel="stylesheet" href="style.css">
    <!-- Библиотека для создания скриншотов -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Tier List Maker</h1>
        
        <div class="tier-list" id="capture-area">
            <!-- Тиры будут созданы автоматически из config.js -->
        </div>

        <div class="item-bank-container">
            <h2>Items</h2>
            <div class="item-bank" id="item-bank">
                <!-- Картинки будут загружены автоматически -->
            </div>
        </div>

        <div class="controls">
            <button id="save-image">Save as Image</button>
            <button id="share-tg">Share to Telegram</button>
            <button id="reset-list">Reset</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
